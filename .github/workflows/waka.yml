name: Waka Readme

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:  

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      
      - uses: actions/checkout@v3
      
      - name: WakaTime Readme
        uses: waka-readme/waka-readme-action@v1
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
